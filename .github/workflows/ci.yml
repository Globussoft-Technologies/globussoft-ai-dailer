name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go audio service tests ──────────────────────────────────────────────────
  go-tests:
    name: Go Audio Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Run Go tests
        working-directory: backend
        run: make test-ci

      - name: Build Go binary
        working-directory: backend
        run: make build

  # ── Go Docker image build check ────────────────────────────────────────────
  go-docker:
    name: Go Docker Build
    runs-on: ubuntu-latest
    needs: go-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: backend
        run: docker build -t callified-go-audio:ci .

  api-tests:
    name: API E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check all Python files
        run: python -m py_compile database.py routes.py main.py billing.py billing_routes.py prompt_builder.py ws_handler.py dial_routes.py auth.py scheduler.py retry_worker.py email_service.py invoice_service.py call_guard.py webhook_dispatch.py recording_service.py tts.py wa_followup.py
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || true

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Build
        run: cd frontend && npm run build
      - name: Check bundle size
        run: |
          SIZE=$(du -sk frontend/dist/assets/*.js | awk '{sum+=$1} END{print sum}')
          echo "Bundle size: ${SIZE}KB"
          if [ $SIZE -gt 1000 ]; then echo "WARNING: Bundle over 1MB"; fi
