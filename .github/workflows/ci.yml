name: CI — API & Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio requests

      - name: Run API tests against production
        env:
          E2E_BASE_URL: https://test.callified.ai
        run: python -m pytest tests/e2e/test_api_v1.py -v

  ws-tests:
    name: WebSocket Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run WebSocket tests
        run: python -m pytest tests/e2e/test_ws_core.py -v

  playwright-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-playwright playwright

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: https://test.callified.ai
        run: python -m pytest tests/ui_e2e/ -v --tb=short
