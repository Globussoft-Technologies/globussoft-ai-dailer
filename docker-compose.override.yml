# ── Dev override — auto-reload on file changes ────────────────────────────────
# Loaded automatically alongside docker-compose.yml. Do NOT use in production.
#
# RAG service: uvicorn --reload on port 8002 → auto-restarts on any .py save
# Frontend:    Vite dev server on port 5173  → HMR on any frontend/src/ save
#
# Open http://localhost:5173 in your browser during development.
# Go audio service (go-audio) runs as normal — rebuild it separately with:
#   docker compose up -d --no-deps --build go-audio

services:

  # ── RAG service: hot-reload ───────────────────────────────────────────────────
  rag-service:
    volumes:
      - ./rag.py:/app/rag.py                    # live mount for rag.py edits
      - ./rag_service.py:/app/rag_service.py    # live mount for service edits
      - faiss_indexes:/app/faiss_indexes
    command:
      - uvicorn
      - rag_service:app
      - --host
      - "0.0.0.0"
      - --port
      - "8002"
      - --reload
    restart: "no"

  # ── Frontend: Vite HMR dev server ────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app                 # live source mount → HMR sees every file save
      - /app/node_modules               # keep container node_modules, don't overwrite
    ports:
      - "5173:5173"
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    depends_on:
      - go-audio
    restart: "no"
