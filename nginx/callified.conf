# callified.conf — Nginx configuration for the Callified AI Dialer (Phase 5: Go-only backend)
#
# Architecture:
#   :80/:443   Nginx (this file)
#     → /media-stream          → Go audio :8001  (WebSocket, full duration)
#     → /ws/*                  → Go audio :8001  (WebSocket)
#     → /api/*                 → Go audio :8001  (all REST)
#     → /wa/webhook/*          → Go audio :8001  (WA provider webhooks)
#     → /webhook/*             → Go audio :8001  (Twilio/Exotel callbacks)
#     → /                      → SPA static files (frontend/dist)

# ─── Upstreams ────────────────────────────────────────────────────────────────

upstream go_audio {
    server 127.0.0.1:8001;
    keepalive 64;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ─── Main HTTPS server ────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name callified.ai www.callified.ai test.callified.ai testgo.callified.ai;

    ssl_certificate     /etc/letsencrypt/live/callified.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/callified.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── WebSocket: Exotel media stream ───────────────────────────────────────
    # CRITICAL: Must not timeout — Exotel streams last the entire call duration.
    location /media-stream {
        proxy_pass         http://go_audio;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;  # 1-hour max call duration
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── WebSocket: /ws/sandbox and /ws/monitor/* ──────────────────────────────
    location /ws/ {
        proxy_pass         http://go_audio;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── Prometheus metrics (internal only) ───────────────────────────────────
    # Scraped by Prometheus on the same host; blocked from the public internet.
    location /metrics {
        proxy_pass http://go_audio;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # ── REST API → Go (all routes) ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://go_audio;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── WhatsApp provider webhooks → Go ──────────────────────────────────────
    location ~ ^/wa/webhook/ {
        proxy_pass         http://go_audio;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Telephony webhooks → Go ───────────────────────────────────────────────
    # Twilio/Exotel status callbacks and recording notifications.
    location ~ ^/(webhook/(twilio|exotel)|exotel/recording-ready|crm-webhook) {
        proxy_pass         http://go_audio;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Ping / health (no-auth) → Go ─────────────────────────────────────────
    location = /ping {
        proxy_pass http://go_audio;
        access_log off;
    }

    location /health {
        proxy_pass http://go_audio;
        access_log off;
    }

    # ── SPA frontend (static files) ───────────────────────────────────────────
    # Built by: cd frontend && npm run build  → output in frontend/dist/
    # Nginx serves the compiled assets directly — no Python process needed.
    location / {
        root  /var/www/callified/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
