# go_ramp.conf — Phase 5: Python retired; all traffic routes to go_audio.
#
# Previously this file controlled a split_clients ramp between go_audio and
# python_api. The python_api service has been removed. This file is kept as a
# placeholder in case a future A/B or canary split is needed.
#
# $audio_upstream is referenced in legacy location blocks; it always resolves
# to go_audio now.

geo $audio_upstream {
    default go_audio;
}
