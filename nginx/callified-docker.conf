# callified-docker.conf — Nginx config for Docker Compose (Phase 5: Go-only backend)
#
# All API traffic → Go :8001
# WebSocket (audio + sandbox + monitor) → Go :8001
# SPA frontend → served directly from /app/frontend/dist static files
#
# HTTP only on port 80 — terminate TLS at your load balancer / Cloudflare.
# server_name _ — accepts all hostnames (localhost, IP, any domain).

# ─── Upstreams ────────────────────────────────────────────────────────────────

upstream go_audio {
    server go-audio:8001;
    keepalive 64;
}

# ─── HTTP server ──────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── WebSocket: Exotel media stream ──────────────────────────────────────
    location /media-stream {
        proxy_pass         http://go_audio;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── WebSocket: browser sandbox + manager monitor ────────────────────────
    location /ws/ {
        proxy_pass         http://go_audio;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # ── Prometheus metrics (internal only) ─────────────────────────────────
    location /metrics {
        proxy_pass http://go_audio;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # ── REST API → Go ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://go_audio;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── WA Provider Webhooks → Go ───────────────────────────────────────────
    location ~ ^/wa/webhook/ {
        proxy_pass         http://go_audio;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Telephony Webhooks → Go ─────────────────────────────────────────────
    location ~ ^/(webhook/(twilio|exotel)|exotel/recording-ready|crm-webhook) {
        proxy_pass         http://go_audio;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location = /ping {
        proxy_pass http://go_audio;
        access_log off;
    }

    # ── Health check → Go ───────────────────────────────────────────────────
    location /health {
        proxy_pass http://go_audio;
        access_log off;
    }

    # ── SPA frontend (static files) ─────────────────────────────────────────
    # Built by: cd frontend && npm run build  → output in frontend/dist/
    # The volume mount at /app/frontend/dist must be populated before starting Nginx.
    location / {
        root  /app/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
